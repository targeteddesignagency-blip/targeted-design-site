<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Targeted Design — Industry Samples</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Montserrat',system-ui,sans-serif;padding:2rem}
h1{font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:.25rem}
h1 span{color:#fe1616}
.subtitle{color:#888;font-size:.9rem;margin-bottom:2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:2rem}
.card{background:#111;border-radius:12px;overflow:hidden;transition:transform .2s}
.card:hover{transform:translateY(-4px)}
.card-header{padding:1rem 1.25rem .75rem;border-bottom:1px solid #222}
.card-header .industry{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.card-header .type{color:#888;font-size:.75rem;text-transform:uppercase;letter-spacing:1px}
.card-body{padding:.75rem}
.card-body h3{font-size:.65rem;color:#666;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.5rem}
.preview{width:100%;height:0;padding-bottom:62.5%;position:relative;background:#1a1a1a;border-radius:8px;overflow:hidden;border:1px solid #222}
.preview iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;transform:scale(1);transform-origin:top left}
.render-img{width:100%;border-radius:8px;margin-top:.5rem;border:1px solid #222}
.links{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
.links a{background:#1a1a1a;color:#ccc;font-size:.7rem;padding:.35rem .75rem;border-radius:6px;text-decoration:none;border:1px solid #333;transition:all .15s}
.links a:hover{background:#fe1616;color:#fff;border-color:#fe1616}
.section-title{font-size:.8rem;color:#555;text-transform:uppercase;letter-spacing:2px;margin:2.5rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid #1a1a1a}
.badge{display:inline-block;background:#1a1a1a;color:#fe1616;font-size:.65rem;padding:.15rem .5rem;border-radius:4px;margin-left:.5rem;font-weight:600}
</style>
</head>
<body>
<h1>Targeted<span>.</span>Design</h1>
<p class="subtitle">Batch 001 — Industry Samples Gallery</p>

<div class="section-title">Print-Ready Cards (Front EN / Back ES)</div>
<div class="grid" id="cards-grid"></div>

<div class="section-title">Lifestyle Renders</div>
<div class="grid" id="renders-grid"></div>

<script>
const industries = [
  {slug:'restaurant',icon:'🌮',name:'Restaurants'},
  {slug:'auto-repair',icon:'🔧',name:'Auto Repair'},
  {slug:'hvac',icon:'❄️',name:'HVAC'},
  {slug:'plumbing',icon:'🔩',name:'Plumbing'},
  {slug:'hair-barber',icon:'💈',name:'Hair & Barber'},
  {slug:'childcare',icon:'🧒',name:'Childcare'},
  {slug:'landscaping',icon:'🌿',name:'Landscaping'},
  {slug:'pest-control',icon:'🐛',name:'Pest Control'}
];

const cardsGrid = document.getElementById('cards-grid');
industries.forEach(ind => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="industry">${ind.icon} ${ind.name}</div>
      <div class="type">EDDM Postcard — Bilingual</div>
    </div>
    <div class="card-body">
      <h3>Front (English)</h3>
      <div class="preview">
        <iframe src="${ind.slug}-front-en.html" loading="lazy"></iframe>
      </div>
      <h3 style="margin-top:.75rem">Back (Spanish)</h3>
      <div class="preview">
        <iframe src="${ind.slug}-back-es.html" loading="lazy"></iframe>
      </div>
      <div class="links">
        <a href="${ind.slug}-front-en.html" target="_blank">🔍 Front Full</a>
        <a href="${ind.slug}-back-es.html" target="_blank">🔍 Back Full</a>
      </div>
    </div>
  `;
  cardsGrid.appendChild(card);
});

const rendersGrid = document.getElementById('renders-grid');
industries.forEach(ind => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="industry">${ind.icon} ${ind.name}</div>
      <div class="type">Lifestyle Render</div>
    </div>
    <div class="card-body">
      <img class="render-img" src="renders/${ind.slug}-lifestyle-render.jpg" alt="${ind.name} lifestyle render" loading="lazy">
    </div>
  `;
  rendersGrid.appendChild(card);
});
</script>
</body>
</html>
