<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDDM Postcard — HVAC (EN)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;600;700&display=swap');

  :root {
    --brand-primary: #fe1616;
    --brand-dark: #000000;
    --brand-surface: #333132;
    --brand-text: #ffffff;
    --brand-muted: #999999;
    --font-headline: 'Montserrat', sans-serif;
    --font-body: 'Inter', sans-serif;
    --bleed: 18.75px;
    --trim-w: 3600px;
    --trim-h: 2700px;
    --safe: 75px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; background: #2a2a2a; }

  .page {
    width: calc(var(--trim-w) + var(--bleed) * 2);
    height: calc(var(--trim-h) + var(--bleed) * 2);
    position: relative;
    background: #2a2a2a;
    margin: 0 auto;
  }

  .card {
    position: absolute;
    top: var(--bleed);
    left: var(--bleed);
    width: var(--trim-w);
    height: var(--trim-h);
    background: var(--brand-dark);
    color: var(--brand-text);
    font-family: var(--font-body);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 180px 210px 150px;
  }

  .bleed-fill {
    position: absolute; inset: 0;
    background: var(--brand-dark); z-index: 0;
  }
  .card { z-index: 1; }

  .logo-block { text-align: center; margin-bottom: 30px; }
  .logo-block .logo-mark {
    font-family: var(--font-headline);
    font-size: 126px; font-weight: 900;
    color: var(--brand-text); letter-spacing: -3px; line-height: 1;
  }
  .logo-block .logo-mark span { color: var(--brand-primary); }
  .logo-block .logo-url {
    font-size: 39px; color: var(--brand-muted);
    letter-spacing: 9px; text-transform: uppercase; margin-top: 12px;
  }

  .hook { text-align: center; margin: 45px 0 60px; }
  .hook h1 {
    font-family: var(--font-headline);
    font-size: 120px; font-weight: 900; line-height: 1.1;
    text-transform: uppercase; letter-spacing: 2px; color: var(--brand-text);
  }
  .hook h1 .accent { color: var(--brand-primary); }

  .industry-highlight {
    background: var(--brand-surface);
    border-radius: 32px;
    padding: 60px 90px;
    text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 48px;
    margin: 30px 0;
    width: 100%; max-width: 2940px;
  }
  .industry-highlight .icon-area {
    font-size: 120px; line-height: 1; flex-shrink: 0;
  }
  .industry-highlight .info { text-align: left; }
  .industry-highlight .info .name {
    font-family: var(--font-headline);
    font-size: 60px; font-weight: 800;
    color: var(--brand-text); text-transform: uppercase; letter-spacing: 2px;
  }
  .industry-highlight .info .sub {
    font-size: 36px; color: var(--brand-muted); margin-top: 8px;
  }

  .tagline {
    text-align: center; font-size: 45px; font-weight: 600;
    letter-spacing: 12px; text-transform: uppercase;
    color: var(--brand-muted); margin: 30px 0;
  }

  .cta { text-align: center; margin-top: 15px; }
  .cta .cta-label {
    font-size: 36px; color: var(--brand-muted);
    letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px;
  }
  .cta .phone {
    font-family: var(--font-headline);
    font-size: 108px; font-weight: 900;
    color: var(--brand-primary); letter-spacing: 6px; line-height: 1;
  }
  .cta .url { font-size: 42px; color: var(--brand-text); letter-spacing: 6px; margin-top: 12px; }
  .cta .price-line { margin-top: 24px; font-size: 42px; color: var(--brand-muted); }
  .cta .price-line strong { color: var(--brand-text); }

  @media print {
    @page { size: 12.125in 9.125in; margin: 0; }
    html, body { width: 12.125in; height: 9.125in; background: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { width: 12.125in; height: 9.125in; margin: 0; }
    .card { top: 0.0625in; left: 0.0625in; width: 12in; height: 9in; }
    .bleed-fill { display: block; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="bleed-fill"></div>
  <div class="card">
    <div class="logo-block">
      <div class="logo-mark">Targeted<span>.</span>Design</div>
      <div class="logo-url">Every Door &middot; Every Home</div>
    </div>
    <div class="hook">
      <h1>WHEN THE AC DIES,<br>THEY CALL THE FIRST<br>NUMBER THEY SEE.</h1>
    </div>
    <div class="industry-highlight">
      <div class="icon-area">❄️</div>
      <div class="info">
        <div class="name">HVAC</div>
        <div class="sub">AC &middot; Heating</div>
      </div>
    </div>
    <div class="tagline">Every Door &middot; Every Home &middot; Your Next Customer</div>
    <div class="cta">
      <div class="cta-label">&#11015; Call or Text &#11015;</div>
      <div class="phone">(210) 903-5551</div>
      <div class="url">targeted-design.com</div>
      <div class="price-line">Starting at <strong>$150</strong> &middot; Results Guaranteed</div>
    </div>
  </div>
</div>
</body>
</html>
